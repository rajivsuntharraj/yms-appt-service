replicaCount: 1

image:
  repository: your-registry/yms-appt-service
  tag: "qa-int"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: yms-appt-service.qa-int.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 384Mi

env:
  mongodbDb: yms_appt_service_qa_int

secret:
  mongodbUri: "mongodb://USER:PASSWORD@mongo.qa-int.svc.cluster.local:27017/?authSource=admin"
  jwtSecret: "change-me-qa-int"

